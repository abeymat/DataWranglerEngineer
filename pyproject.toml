[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]

[tool.mypy]
python_version = "3.12"
plugins = []
strict = true
warn_unused_ignores = true
exclude = ["tests/fixtures"]

[[tool.mypy.overrides]]
module = ["openai", "openai.*"]
follow_imports = "skip"
